# ============================================
# Docker Compose - Configuración Base (Producción)
# ============================================
# En desarrollo, docker-compose.override.yml se carga automáticamente.
# En producción: docker compose -f docker-compose.yml up -d
# Con HTTPS:     docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # ============================================
  # MySQL Database
  # ============================================
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-aprendizaje_inventario}
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-apppassword}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations/dump_completo.sql:/docker-entrypoint-initdb.d/01-dump.sql
    healthcheck:
      test: ["CMD", "mysql", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}", "-e", "SELECT 1 FROM aprendizaje_inventario.categorias LIMIT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network

  # ============================================
  # Backend API (Node.js + Express)
  # ============================================
  backend:
    build: ./backend
    restart: unless-stopped
    # No se expone puerto — Nginx hace reverse proxy internamente
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-apppassword}
      DB_NAME: ${DB_NAME:-aprendizaje_inventario}
      JWT_SECRET: ${JWT_SECRET:-change_me_generate_a_64_char_hex_secret}
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # ============================================
  # Frontend (React + Nginx reverse proxy)
  # ============================================
  frontend:
    build:
      context: ./inventario-frontend
      args:
        # URL relativa — Nginx hace proxy a /api → backend:3000
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mysql_data:
  uploads_data:

networks:
  app-network:
    driver: bridge
