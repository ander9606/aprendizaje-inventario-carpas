server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy: las peticiones /api se envían al backend
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy: archivos subidos (logos, imágenes)
    location /uploads/ {
        proxy_pass http://backend:3000/uploads/;
    }

    # SPA routing: todas las rutas redirigen a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets estáticos (Vite hashea los nombres)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
